<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Treino | O Projeto</title>
    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --primary: #00ff88;
            --text-main: #ffffff;
            --text-muted: #a0a0a0;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-main); padding: 20px; padding-bottom: 80px; }
        h1 { text-align: center; margin-bottom: 20px; color: var(--primary); font-size: 24px; text-transform: uppercase; letter-spacing: 2px;}
        
        .days-nav { display: flex; overflow-x: auto; gap: 10px; padding-bottom: 15px; margin-bottom: 20px; }
        .days-nav::-webkit-scrollbar { display: none; }
        .day-btn { background-color: var(--card-bg); color: var(--text-main); border: 1px solid #333; padding: 10px 20px; border-radius: 8px; cursor: pointer; white-space: nowrap; font-weight: bold; transition: 0.3s; }
        .day-btn.active { background-color: var(--primary); color: #000; border-color: var(--primary); }

        #workout-container { display: flex; flex-direction: column; gap: 15px; }
        .exercise-card { background-color: var(--card-bg); padding: 15px; border-radius: 10px; border-left: 4px solid var(--primary); cursor: pointer; transition: all 0.3s ease; position: relative; }
        .exercise-name { font-size: 18px; font-weight: bold; margin-bottom: 5px; transition: 0.3s; }
        .exercise-series { font-size: 16px; color: var(--primary); font-weight: bold; margin-bottom: 5px; transition: 0.3s; }
        .exercise-obs { font-size: 13px; color: var(--text-muted); margin-bottom: 10px; }

        /* Estilos do novo Input de Cargas */
        .carga-container { display: flex; align-items: center; gap: 10px; margin-top: 10px; padding-top: 10px; border-top: 1px solid #333; }
        .carga-label { font-size: 14px; color: var(--text-muted); font-weight: bold; }
        .carga-input { background-color: #2a2a2a; color: var(--primary); border: 1px solid #444; border-radius: 5px; padding: 8px; width: 80px; text-align: center; font-size: 16px; font-weight: bold; outline: none; }
        .carga-input:focus { border-color: var(--primary); }

        .exercise-card.done { opacity: 0.4; border-left-color: #555; background-color: #111; }
        .exercise-card.done .exercise-name { text-decoration: line-through; color: var(--text-muted); }
        .exercise-card.done .exercise-series { color: #555; }

        .regras-box { background-color: #2a2a2a; padding: 15px; border-radius: 10px; margin-bottom: 20px; font-size: 14px; color: #ddd; }
        .regras-box span { color: var(--primary); font-weight: bold; }
        .dica-box { text-align: center; font-size: 12px; color: var(--text-muted); margin-bottom: 15px; }
    </style>
</head>
<body>

    <h1>Rotina de Treino</h1>

    <div class="regras-box">
        <p><span>🔥 REGRA DE OURO:</span> 1-2 reps na reserva.</p>
        <p><span>🚀 AQUECIMENTO:</span> 30% -> 70% no 1º Ex.</p>
    </div>

    <div class="dica-box">👉 Toque no card para marcar/desmarcar como feito</div>

    <div class="days-nav" id="days-nav"></div>
    <div id="workout-container"></div>

    <script>
        const workoutData = {
            "Segunda": [
                { name: "Supino Inclinado com Halteres", series: "4x 8-10 reps", obs: "Carga máxima e controle. Rumo aos 36kg." },
                { name: "Supino Inclinado na Máquina/Smith", series: "3x 8-12 reps", obs: "Foco em ir até a falha com segurança." },
                { name: "Crossover Polia Baixa", series: "4x 12-15 reps", obs: "De baixo para cima. Frita o miolo superior." },
                { name: "Supino Reto (Halteres ou Máquina)", series: "3x 10-12 reps", obs: "Volume para o meio/baixo do peitoral." },
                { name: "Pec Deck (Voador)", series: "3x 12-15 reps", obs: "Segure 1 seg no meio. Pico de contração." },
                { name: "Abdômen na Polia com Corda", series: "4x 10-15 reps", obs: "CORE." },
                { name: "Prancha Ventral", series: "3x até a falha", obs: "CORE." }
            ],
            "Terça": [
                { name: "Agachamento Livre", series: "4x 8-10 reps", obs: "Descer o máximo mantendo a postura reta." },
                { name: "Leg Press 45º", series: "4x 10-12 reps", obs: "Pés no meio, força no calcanhar." },
                { name: "Mesa Flexora", series: "4x 10-12 reps", obs: "Segurar a descida por 3 segundos." },
                { name: "Cadeira Extensora", series: "4x 12-15 reps", obs: "Chutar e segurar o peso no alto 2 segs." },
                { name: "Panturrilha", series: "5x 15-20 reps", obs: "Leg Press ou Máquina." }
            ],
            "Quarta": [
                { name: "Puxada Frontal (Pegada Aberta)", series: "4x 8-12 reps", obs: "Expandir a dorsal." },
                { name: "Remada na Máquina / Apoiada", series: "4x 8-10 reps", obs: "Peito no apoio, soca carga. Protege a lombar." },
                { name: "Remada Unilateral (Serrote)", series: "3x 10-12 reps", obs: "Alongar bem a fibra lá embaixo antes de puxar." },
                { name: "Pulldown na Polia Alta", series: "3x 12-15 reps", obs: "Braço reto, puxa pro quadril." },
                { name: "Crucifixo Inverso (Máquina ou Polia)", series: "4x 15 reps", obs: "Posterior de ombro forte." }
            ],
            "Quinta": [
                { name: "Elevação Lateral com Halteres", series: "5x 12-15 reps", obs: "O construtor da largura. Cotovelo lidera." },
                { name: "Desenvolvimento com Halteres", series: "3x 8-10 reps", obs: "Carga pesada para densidade do ombro." },
                { name: "Elevação Lateral na Polia", series: "3x 12-15 reps", obs: "Tensão contínua no cabo." },
                { name: "Encolhimento de Ombros", series: "5x 10-12 reps", obs: "Segura 2 segs no topo apertando o trapézio." },
                { name: "Elevação de Pernas em Suspensão", series: "4x até a falha", obs: "CORE." }
            ],
            "Sexta": [
                { name: "Tríceps Testa", series: "4x 10-12 reps", obs: "Cotovelos para o teto." },
                { name: "Tríceps Corda na Polia", series: "3x 12-15 reps", obs: "Abre bem a corda no final." },
                { name: "Tríceps Coice Unilateral na Polia", series: "3x 12-15 reps", obs: "Sem pegador. Trava o cotovelo e chuta." },
                { name: "Rosca Direta (Barra W ou Halteres)", series: "4x 8-10 reps", obs: "Sem jogar o tronco para trás." },
                { name: "Rosca Inclinada com Halteres", series: "3x 10-12 reps", obs: "Banco inclinado, braço para trás do corpo." },
                { name: "Rosca Martelo", series: "3x 12-15 reps", obs: "Desenvolve o braquial." }
            ]
        };

        const daysNav = document.getElementById('days-nav');
        const workoutContainer = document.getElementById('workout-container');
        const diasSemana = ['Domingo', 'Segunda', 'Terça', 'Quarta', 'Quinta', 'Sexta', 'Sábado'];
        let hoje = diasSemana[new Date().getDay()];
        
        // Se for fim de semana, abre na segunda por padrão
        if (hoje === 'Domingo' || hoje === 'Sábado') hoje = 'Segunda';

        function toggleDone(day, index, cardElement) {
            let doneExercises = JSON.parse(localStorage.getItem('done_' + day)) || [];
            if (doneExercises.includes(index)) {
                doneExercises = doneExercises.filter(i => i !== index);
                cardElement.classList.remove('done');
            } else {
                doneExercises.push(index);
                cardElement.classList.add('done');
            }
            localStorage.setItem('done_' + day, JSON.stringify(doneExercises));
        }

        // Função para salvar a carga dinamicamente
        function salvarCarga(day, index, value) {
            localStorage.setItem(`carga_${day}_${index}`, value);
        }

        function renderWorkout(day) {
            workoutContainer.innerHTML = '';
            let doneExercises = JSON.parse(localStorage.getItem('done_' + day)) || [];

            if(workoutData[day]){
                workoutData[day].forEach((ex, index) => {
                    const card = document.createElement('div');
                    card.className = 'exercise-card';
                    if (doneExercises.includes(index)) card.classList.add('done');

                    // Recupera a carga salva, se houver
                    const savedCarga = localStorage.getItem(`carga_${day}_${index}`) || '';

                    card.innerHTML = `
                        <div class="exercise-name">${ex.name}</div>
                        <div class="exercise-series">${ex.series}</div>
                        <div class="exercise-obs">${ex.obs}</div>
                        <div class="carga-container">
                            <span class="carga-label">Carga atual:</span>
                            <input type="number" class="carga-input" placeholder="kg" value="${savedCarga}" 
                                onclick="event.stopPropagation()" 
                                oninput="salvarCarga('${day}', ${index}, this.value)">
                        </div>
                    `;
                    
                    // O clique na div (menos no input) marca como concluído
                    card.onclick = () => toggleDone(day, index, card);
                    workoutContainer.appendChild(card);
                });
            } else {
                 workoutContainer.innerHTML = '<p style="text-align: center; color: #a0a0a0;">Dia de descanso, campeão!</p>';
            }

            document.querySelectorAll('.day-btn').forEach(btn => {
                btn.classList.remove('active');
                if (btn.innerText === day) btn.classList.add('active');
            });
        }

        Object.keys(workoutData).forEach(day => {
            const btn = document.createElement('button');
            btn.className = `day-btn ${day === hoje ? 'active' : ''}`;
            btn.innerText = day;
            btn.onclick = () => renderWorkout(day);
            daysNav.appendChild(btn);
        });

        renderWorkout(hoje);
    </script>
</body>
</html>
