<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Treino | Bro Split</title>
    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --primary: #00ff88;
            --text-main: #ffffff;
            --text-muted: #a0a0a0;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-main); padding: 20px; padding-bottom: 80px; }
        h1 { text-align: center; margin-bottom: 20px; color: var(--primary); font-size: 24px; text-transform: uppercase; letter-spacing: 2px;}
        
        /* Menu de Dias */
        .days-nav { display: flex; overflow-x: auto; gap: 10px; padding-bottom: 15px; margin-bottom: 20px; }
        .days-nav::-webkit-scrollbar { display: none; }
        .day-btn { background-color: var(--card-bg); color: var(--text-main); border: 1px solid #333; padding: 10px 20px; border-radius: 8px; cursor: pointer; white-space: nowrap; font-weight: bold; transition: 0.3s; }
        .day-btn.active { background-color: var(--primary); color: #000; border-color: var(--primary); }

        /* Cards de Exercícios */
        #workout-container { display: flex; flex-direction: column; gap: 15px; }
        .exercise-card { background-color: var(--card-bg); padding: 15px; border-radius: 10px; border-left: 4px solid var(--primary); cursor: pointer; transition: all 0.3s ease; position: relative; }
        .exercise-name { font-size: 18px; font-weight: bold; margin-bottom: 5px; transition: 0.3s; }
        .exercise-series { font-size: 16px; color: var(--primary); font-weight: bold; margin-bottom: 5px; transition: 0.3s; }
        .exercise-obs { font-size: 13px; color: var(--text-muted); }

        /* Estilo do Exercício Concluído */
        .exercise-card.done { opacity: 0.4; border-left-color: #555; background-color: #111; }
        .exercise-card.done .exercise-name { text-decoration: line-through; color: var(--text-muted); }
        .exercise-card.done .exercise-series { color: #555; }

        /* Header Regras */
        .regras-box { background-color: #2a2a2a; padding: 15px; border-radius: 10px; margin-bottom: 20px; font-size: 14px; color: #ddd; }
        .regras-box span { color: var(--primary); font-weight: bold; }
        .dica-box { text-align: center; font-size: 12px; color: var(--text-muted); margin-bottom: 15px; }
    </style>
</head>
<body>

    <h1>Rotina de Treino</h1>

    <div class="regras-box">
        <p><span>🔥 REGRA DE OURO:</span> 1-2 reps na reserva.</p>
        <p><span>🚀 AQUECIMENTO (1º Ex):</span> 30% -> 70% -> 100%.</p>
    </div>

    <div class="dica-box">👉 Toque no card para marcar/desmarcar como feito</div>

    <div class="days-nav" id="days-nav">
        <!-- Botões gerados via JS -->
    </div>

    <div id="workout-container">
        <!-- Exercícios gerados via JS -->
    </div>

    <script>
        const workoutData = {
            "Segunda": [
                { name: "Puxada Frontal (Pegada Aberta)", series: "4x 8-12 reps", obs: "Aquecimento: 30% -> 70% da carga." },
                { name: "Remada na Máquina / Apoiada", series: "4x 8-10 reps", obs: "Sem remada curvada para proteger a escoliose." },
                { name: "Remada Unilateral (Serrote)", series: "3x 10-12 reps", obs: "Foco em isolamento." },
                { name: "Pulldown na Polia Alta", series: "3x 12-15 reps", obs: "Esticar bem a dorsal." },
                { name: "Crucifixo Inverso", series: "4x 12-15 reps", obs: "Máquina ou Polia." },
                { name: "Abdômen na Polia com Corda", series: "4x 10-15 reps", obs: "Soltar todo o ar na contração. CORE." },
                { name: "Elevação de Pernas em Suspensão", series: "3x até a falha", obs: "Enrolar a bacia. CORE." },
                { name: "Prancha Ventral", series: "3x até a falha", obs: "Puxar a barriga pra dentro. CORE." }
            ],
            "Terça": [
                { name: "Agachamento Livre", series: "4x 8-10 reps", obs: "Série leve com a barra, depois 30% -> 70%." },
                { name: "Leg Press 45º", series: "4x 10-12 reps", obs: "1 série de 70% pra ajustar a máquina antes." },
                { name: "Mesa Flexora", series: "4x 10-12 reps", obs: "Controle na descida." },
                { name: "Cadeira Extensora", series: "3x 12-15 reps", obs: "Pico de contração em cima." },
                { name: "Panturrilha", series: "4x 15-20 reps", obs: "Em pé ou sentado." }
            ],
            "Quarta": [
                { name: "Rosca Direta (Barra ou Halteres)", series: "4x 8-12 reps", obs: "Aquecimento: 30% -> 70% da carga." },
                { name: "Tríceps Testa (Declinado)", series: "4x 10-12 reps", obs: "Cotovelos fechados." },
                { name: "Rosca Inclinada com Halteres", series: "3x 10-12 reps", obs: "Deixa o braço esticar lá atrás." },
                { name: "Tríceps Corda na Polia", series: "3x 12-15 reps", obs: "Abre a corda no final." },
                { name: "Paralelas ou Tríceps Coice", series: "3x 12-15 reps", obs: "Coice: Trava o cotovelo e chuta pra trás." }
            ],
            "Quinta": [
                { name: "Desenvolvimento com Halteres", series: "4x 8-12 reps", obs: "Aquecimento: 30% -> 70% da carga." },
                { name: "Elevação Lateral com Halteres", series: "4x 12-15 reps", obs: "Capricha na descida (fase excêntrica)." },
                { name: "Elevação Frontal", series: "3x 10-12 reps", obs: "Carga leve/moderada." },
                { name: "Crucifixo Inverso", series: "3x 15 reps", obs: "Foco total no posterior do ombro." },
                { name: "Encolhimento de Ombros", series: "4x 10-12 reps", obs: "Segura em cima." },
                { name: "Abdômen na Polia com Corda", series: "4x 10-15 reps", obs: "CORE." },
                { name: "Elevação de Pernas em Suspensão", series: "3x até a falha", obs: "CORE." },
                { name: "Prancha Ventral", series: "3x até a falha", obs: "CORE." }
            ],
            "Sexta": [
                { name: "Supino Inclinado com Halteres", series: "4x 8-10 reps", obs: "Exercício Rei. Aquecimento: 30% -> 70%." },
                { name: "Supino Inclinado (Máquina) ou Reto", series: "3x 8-10 reps", obs: "Foco no peitoral." },
                { name: "Crucifixo Inclinado com Halteres", series: "3x 12-15 reps", obs: "Alonga bem lá embaixo." },
                { name: "Crossover Unilateral na Polia Baixa", series: "3x 12-15 reps", obs: "De baixo para cima. Foco no topo do peito." },
                { name: "Pec Deck (Voador)", series: "3x 12-15 reps", obs: "Esmaga no meio." }
            ],
            "Sábado": [
                { name: "Leg Press", series: "3x 12 reps", obs: "Opcional. Treino leve/moderado." },
                { name: "Mesa Flexora", series: "3x 12 reps", obs: "Opcional." },
                { name: "Cadeira Abdutora", series: "3x 15 reps", obs: "Opcional." },
                { name: "Panturrilha", series: "4x 15-20 reps", obs: "Opcional." }
            ]
        };

        const daysNav = document.getElementById('days-nav');
        const workoutContainer = document.getElementById('workout-container');

        // Pega o dia atual da semana em português
        const diasSemana = ['Domingo', 'Segunda', 'Terça', 'Quarta', 'Quinta', 'Sexta', 'Sábado'];
        let hoje = diasSemana[new Date().getDay()];
        if (hoje === 'Domingo') hoje = 'Segunda';

        // Lógica para salvar os concluídos no localStorage
        function toggleDone(day, index, cardElement) {
            let doneExercises = JSON.parse(localStorage.getItem('done_' + day)) || [];
            
            if (doneExercises.includes(index)) {
                // Se já tá feito, desmarca
                doneExercises = doneExercises.filter(i => i !== index);
                cardElement.classList.remove('done');
            } else {
                // Se não tá feito, marca
                doneExercises.push(index);
                cardElement.classList.add('done');
            }
            
            localStorage.setItem('done_' + day, JSON.stringify(doneExercises));
        }

        function renderWorkout(day) {
            workoutContainer.innerHTML = '';
            
            // Busca o que já foi feito naquele dia no navegador
            let doneExercises = JSON.parse(localStorage.getItem('done_' + day)) || [];

            workoutData[day].forEach((ex, index) => {
                const card = document.createElement('div');
                card.className = 'exercise-card';
                
                // Se o índice do exercício estiver salvo no localStorage, aplica a classe done
                if (doneExercises.includes(index)) {
                    card.classList.add('done');
                }

                card.innerHTML = `
                    <div class="exercise-name">${ex.name}</div>
                    <div class="exercise-series">${ex.series}</div>
                    <div class="exercise-obs">${ex.obs}</div>
                `;

                // Evento de clique para marcar/desmarcar
                card.onclick = () => toggleDone(day, index, card);

                workoutContainer.appendChild(card);
            });

            // Atualiza o menu superior
            document.querySelectorAll('.day-btn').forEach(btn => {
                btn.classList.remove('active');
                if (btn.innerText === day) btn.classList.add('active');
            });
        }

        // Criar botões do menu
        Object.keys(workoutData).forEach(day => {
            const btn = document.createElement('button');
            btn.className = `day-btn ${day === hoje ? 'active' : ''}`;
            btn.innerText = day;
            btn.onclick = () => renderWorkout(day);
            daysNav.appendChild(btn);
        });

        // Iniciar
        renderWorkout(hoje);
    </script>
</body>
</html>
